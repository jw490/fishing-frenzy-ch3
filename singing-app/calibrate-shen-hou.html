<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>神后 Tap Calibration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f; color: #fff;
  font-family: -apple-system, sans-serif;
  min-height: 100vh; padding: 14px 12px 60px;
  user-select: none; -webkit-user-select: none;
}
h1 { font-size: 0.95rem; color: #444; text-align: center; margin-bottom: 10px; }
#status { font-size: 0.78rem; color: #555; text-align: center; margin-bottom: 10px; min-height: 16px; }

/* progress */
#prog-wrap { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
#prog-text  { font-size:0.75rem; color:#444; white-space:nowrap; }
#prog-bar-bg{ flex:1; height:4px; background:#161616; border-radius:2px; }
#prog-bar   { height:100%; background:#7b2fff; border-radius:2px; transition:width .2s; }

/* lyric display */
#prev-txt  { font-size:0.85rem; color:#2a2a2a; text-align:center; min-height:22px; }
#curr-txt  {
  font-size: 2.8rem; font-weight:800; color:#00d4ff;
  text-align:center; letter-spacing:.06em;
  min-height:74px; display:flex; align-items:center; justify-content:center;
}
#next-txt  { font-size:0.85rem; color:#2a2a2a; text-align:center; min-height:22px; margin-bottom:14px; }

/* clock + seek */
#clock { font-size:2.4rem; font-weight:800; color:#ffd700;
  text-align:center; font-variant-numeric:tabular-nums; margin-bottom:6px; }
#seek-wrap { margin-bottom:4px; padding:0 4px; }
#seek { width:100%; accent-color:#7b2fff; cursor:pointer; height:22px; }
#seek-labels { display:flex; justify-content:space-between;
  font-size:0.65rem; color:#333; margin-bottom:16px; padding:0 2px; }

/* scrub buttons */
#scrub-row { display:flex; justify-content:center; gap:8px; margin-bottom:14px; }
.scrub-btn { padding:8px 14px; border-radius:10px; border:1px solid #222;
  background:#111; color:#666; font-size:0.82rem; cursor:pointer;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
.scrub-btn:active { background:#1e1e1e; color:#ccc; }

/* tap button */
#tap-btn {
  display:block; width:min(340px,94vw); height:96px; margin:0 auto 14px;
  background:linear-gradient(135deg,#7b2fff,#00d4ff);
  border:none; border-radius:18px; cursor:pointer;
  font-size:1.5rem; font-weight:800; color:#fff; letter-spacing:.08em;
  touch-action:manipulation; transition:transform .07s,opacity .07s;
  -webkit-tap-highlight-color:transparent;
}
#tap-btn:active  { transform:scale(.93); opacity:.82; }
#tap-btn.flash   { background:linear-gradient(135deg,#ff2fa8,#ffd700) !important; }
#tap-btn:disabled{ background:#181818; color:#333; cursor:default; }

/* controls */
#ctrl-row { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:12px; }
.ctrl { padding:8px 14px; border-radius:10px; border:1px solid #222;
  background:#111; color:#777; cursor:pointer; font-size:0.8rem;
  touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
.ctrl:active { background:#1e1e1e; color:#ccc; }
.ctrl.red { border-color:#400; color:#a33; }

/* ALL LINES list — tap to jump */
#lines-panel {
  margin-bottom:12px; max-height:240px; overflow-y:auto;
  border:1px solid #181818; border-radius:10px;
}
.line-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 10px; border-bottom:1px solid #111; cursor:pointer;
  transition:background .1s;
}
.line-row:last-child { border-bottom:none; }
.line-row:active { background:#1a1a2a; }
.line-row.active  { background:#0a1020; }
.line-row .ln     { font-size:0.7rem; color:#333; min-width:26px; }
.line-row .lt     { font-size:0.75rem; color:#0a8; min-width:54px; font-variant-numeric:tabular-nums; }
.line-row .lw     { font-size:1rem; font-weight:600; color:#888; flex:1; }
.line-row.active .lw { color:#00d4ff; }
.line-row .lt.skipped { color:#333; font-style:italic; }
.line-row .retap-hint { font-size:0.65rem; color:#333; }

/* output */
#out-box {
  display:none; background:#091209; border:1px solid #1a3a1a;
  border-radius:10px; padding:10px; font-size:0.65rem; color:#0c0;
  word-break:break-all; white-space:pre-wrap; max-height:150px; overflow-y:auto;
  margin-bottom:8px;
}
#copy-btn { display:none; padding:8px 24px; border-radius:8px;
  border:1px solid #0c0; background:#001800; color:#0c0; cursor:pointer; font-size:0.85rem; }
#save-note { font-size:0.65rem; color:#252525; text-align:center; margin-top:8px; }
</style>
</head>
<body>

<h1>神后 — Full-Song Tap Calibration</h1>
<div id="status">Press ▶ START to load audio</div>

<div id="prog-wrap">
  <div id="prog-text">0 / 78</div>
  <div id="prog-bar-bg"><div id="prog-bar" style="width:0%"></div></div>
</div>

<div id="prev-txt"></div>
<div id="curr-txt">—</div>
<div id="next-txt"></div>

<div id="clock">0.0s</div>
<div id="seek-wrap"><input type="range" id="seek" min="0" max="307" step="0.5" value="0"></div>
<div id="seek-labels"><span>0:00</span><span>1:17</span><span>2:34</span><span>3:50</span><span>5:07</span></div>

<div id="scrub-row">
  <button class="scrub-btn" id="back10">−10s</button>
  <button class="scrub-btn" id="back5">−5s</button>
  <button class="scrub-btn" id="fwd5">+5s</button>
</div>

<button id="tap-btn" disabled>TAP when she sings</button>

<div id="ctrl-row">
  <button class="ctrl" id="start-btn">▶ START</button>
  <button class="ctrl" id="pause-btn">⏸ PAUSE</button>
  <button class="ctrl" id="undo-btn">↩ UNDO</button>
  <button class="ctrl" id="skip-btn">⏭ SKIP</button>
  <button class="ctrl" id="done-btn">✓ DONE</button>
  <button class="ctrl red" id="clear-btn">✕ CLEAR ALL</button>
</div>

<!-- clickable lines list -->
<div id="lines-panel"></div>

<div id="out-box"></div>
<button id="copy-btn" onclick="copyOut()">📋 Copy JSON</button>
<div id="save-note">Auto-saved in browser — close &amp; reopen anytime</div>

<script>
const AUDIO_SRC   = '/media/shen-hou-mv-audio.mp3';
const STORAGE_KEY = 'shen-hou-calib-v4';

const LINES = [
  '我','喜欢看你','孩子般走在前头','像第一次','发现世界的探索',
  '告诉我','鲜艳的颜色好多','你','改不掉突然','停下来回过头',
  '想再一次','习惯性确认什么','像是要牵手','或是一起走',
  '直到风景褪色','的时候','你身后','会有我',
  '守护你看见','尽头的背后','那片天空','等着另一端','新的生活',
  '能不能','答应我','临别时候','或许你就先走','徒留感伤就',
  '请你留给我','让我面对','你往后的寂寞','能不能答应我',
  '分开时候','放心回头看我','让我明白牵挂着','你的手',
  '松开后还能忍住','泪向你告别','挥手','记得你爱过',
  '你要记得你爱过','记得你曾经走过','记得继续向前走',
  '记得我眼中','见过你停留','你的身影','一直在我的',
  '世界里驻守',
  // ── second chorus onwards — tap these ──
  '能不能答应我',
  '临别时你','或许就先走','徒留的感伤','都留给我',
  '让我面对','你往后的寂寞','能不能答应我',
  '分开时候','放心回头看我','让我明白牵挂着','你的手',
  '松开后','能拭去泪向你','告别挥手',
  '别急着答应我','难过的话','现在不要说',
  '呜','好好享受','安宁的温柔',
  '能不能答应我','再见时候','就别再认出我','别让我承受',
  '牵过的你的手','再重逢','已换作','你向我告别','挥手'
];

// Pre-filled: L1-L48 confirmed from previous session (L49 onwards = retap)
const PREFILL = [58.945,60.416,61.689,64.977,66.209,69.658,71.665,77.399,78.916,80.337,83.404,84.575,88.143,90.342,92.792,95.075,97.328,99.765,102.644,104.441,106.909,109.544,111.177,113.098,114.282,116.899,118.749,121.759,123.608,126.176,128.675,132.539,135.259,137.29,140.557,141.332,145.444,148.059,148.759,156.682,159.325,161.879,164.162,165.841,168.042,169.392,170.651,172.041];
const PREFILL_COUNT = PREFILL.length; // 48

// taps[i] = number or null
let taps    = Array(LINES.length).fill(null);
let lineIdx = PREFILL_COUNT; // start at L49
let audio   = null;
let running = false;
let rafId   = null;
let seekDrag= false;

// ── persist ───────────────────────────────────────────────────────────────
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (d && Array.isArray(d.taps) && d.taps.length === LINES.length) {
      taps    = d.taps;
      lineIdx = d.lineIdx ?? firstNull();
      return;
    }
  } catch(e) {}
  // First run: seed pre-filled confirmed taps for L1-L48
  for (let i = 0; i < PREFILL_COUNT; i++) taps[i] = PREFILL[i];
  lineIdx = PREFILL_COUNT;
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ taps, lineIdx })); } catch(e) {}
}
function firstNull() {
  // first line that hasn't been tapped yet (from the end of the tapped block)
  let last = -1;
  for (let i = 0; i < taps.length; i++) if (taps[i] !== null) last = i;
  return Math.min(last + 1, LINES.length);
}

// ── DOM refs ──────────────────────────────────────────────────────────────
const tapBtn  = document.getElementById('tap-btn');
const currTxt = document.getElementById('curr-txt');
const prevTxt = document.getElementById('prev-txt');
const nextTxt = document.getElementById('next-txt');
const clockEl = document.getElementById('clock');
const statusEl= document.getElementById('status');
const progTxt = document.getElementById('prog-text');
const progBar = document.getElementById('prog-bar');
const seekEl  = document.getElementById('seek');
const panel   = document.getElementById('lines-panel');

// ── build clickable lines panel ───────────────────────────────────────────
function buildPanel() {
  panel.innerHTML = '';
  LINES.forEach((line, i) => {
    const row = document.createElement('div');
    row.className = 'line-row' + (i === lineIdx ? ' active' : '');
    row.dataset.idx = i;

    const tStr = taps[i] !== null
      ? taps[i].toFixed(2) + 's'
      : (i < lineIdx ? 'skipped' : '');

    row.innerHTML = `
      <span class="ln">L${String(i+1).padStart(2,'0')}</span>
      <span class="lt ${taps[i]===null && i<lineIdx ? 'skipped' : ''}">${tStr}</span>
      <span class="lw">${line}</span>
      ${i < lineIdx ? '<span class="retap-hint">tap to retap</span>' : ''}
    `;

    row.addEventListener('click', () => jumpTo(i));
    panel.appendChild(row);
  });
}

function scrollPanelToActive() {
  const active = panel.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
}

// ── jump to line ──────────────────────────────────────────────────────────
function jumpTo(i) {
  lineIdx = i;
  save();
  refreshAll();
  // seek audio to just before that line's tap (or 3s before it)
  if (audio && taps[i] !== null) {
    audio.currentTime = Math.max(0, taps[i] - 3);
  } else if (audio && i > 0 && taps[i-1] !== null) {
    audio.currentTime = Math.max(0, taps[i-1] - 1);
  }
}

// ── display refresh ───────────────────────────────────────────────────────
function refreshAll() {
  const done = taps.filter(t => t !== null).length;
  progTxt.textContent = `${done} / ${LINES.length}`;
  progBar.style.width  = (done / LINES.length * 100) + '%';

  if (lineIdx >= LINES.length) {
    currTxt.textContent = '✓ All done!';
    prevTxt.textContent = '';
    nextTxt.textContent = '';
    tapBtn.disabled = true;
    showOut();
  } else {
    currTxt.textContent = LINES[lineIdx];
    prevTxt.textContent = lineIdx > 0
      ? (taps[lineIdx-1] !== null ? `✓ ${LINES[lineIdx-1]}` : `— ${LINES[lineIdx-1]}`)
      : '';
    nextTxt.textContent = lineIdx+1 < LINES.length ? `↓ ${LINES[lineIdx+1]}` : '';
    if (running) tapBtn.disabled = false;
  }

  buildPanel();
  scrollPanelToActive();
}

// ── clock ─────────────────────────────────────────────────────────────────
function tick() {
  if (audio && !seekDrag) {
    const t = audio.currentTime;
    clockEl.textContent = t.toFixed(1) + 's';
    seekEl.value = t;
  }
  rafId = requestAnimationFrame(tick);
}

// ── seek bar ──────────────────────────────────────────────────────────────
seekEl.addEventListener('mousedown',  () => seekDrag = true);
seekEl.addEventListener('touchstart', () => seekDrag = true, { passive:true });
seekEl.addEventListener('input', () => {
  const t = parseFloat(seekEl.value);
  clockEl.textContent = t.toFixed(1) + 's';
  if (audio) audio.currentTime = t;
});
seekEl.addEventListener('mouseup',  () => seekDrag = false);
seekEl.addEventListener('touchend', () => seekDrag = false);

// ── scrub buttons ─────────────────────────────────────────────────────────
function scrub(delta) {
  if (!audio) return;
  audio.currentTime = Math.max(0, audio.currentTime + delta);
}
document.getElementById('back10').addEventListener('click', () => scrub(-10));
document.getElementById('back5' ).addEventListener('click', () => scrub(-5));
document.getElementById('fwd5'  ).addEventListener('click', () => scrub(+5));

// ── start / pause ─────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  if (audio) { audio.play(); return; }
  statusEl.textContent = 'Loading audio…';
  audio = new Audio(AUDIO_SRC);
  audio.preload = 'auto';
  audio.addEventListener('loadedmetadata', () => { seekEl.max = audio.duration || 307; });
  audio.addEventListener('canplaythrough', () => {
    statusEl.textContent = 'Tap when each line starts • click any line below to retap it';
    tapBtn.disabled = false;
    running = true;
    // Seek to 5s before L49 (能不能答应我) so user is ready to tap
    audio.currentTime = Math.max(0, (taps[PREFILL_COUNT - 1] || 168) - 2);
    audio.play();
    tick();
    refreshAll();
  }, { once: true });
  audio.addEventListener('error', () => { statusEl.textContent = '⚠ Audio error'; });
  audio.load();
});
document.getElementById('pause-btn').addEventListener('click', () => {
  if (!audio) return;
  audio.paused ? audio.play() : audio.pause();
});

// ── tap ───────────────────────────────────────────────────────────────────
function doTap() {
  if (!running || !audio || lineIdx >= LINES.length) return;
  const t = audio.currentTime;
  taps[lineIdx] = t;

  tapBtn.classList.add('flash');
  setTimeout(() => tapBtn.classList.remove('flash'), 150);

  lineIdx++;
  save();
  refreshAll();
}

tapBtn.addEventListener('click', doTap);
tapBtn.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive:false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); doTap(); }
});

// ── undo ──────────────────────────────────────────────────────────────────
document.getElementById('undo-btn').addEventListener('click', () => {
  if (lineIdx === 0) return;
  lineIdx--;
  taps[lineIdx] = null;
  save();
  refreshAll();
  document.getElementById('out-box').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
});

// ── skip ──────────────────────────────────────────────────────────────────
document.getElementById('skip-btn').addEventListener('click', () => {
  if (lineIdx >= LINES.length) return;
  taps[lineIdx] = null;
  lineIdx++;
  save();
  refreshAll();
});

// ── done ──────────────────────────────────────────────────────────────────
document.getElementById('done-btn').addEventListener('click', showOut);

// ── clear ─────────────────────────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear ALL taps?')) return;
  taps    = Array(LINES.length).fill(null);
  lineIdx = 0;
  save();
  refreshAll();
  document.getElementById('out-box').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
});

// ── output ────────────────────────────────────────────────────────────────
function showOut() {
  const box = document.getElementById('out-box');
  box.textContent = JSON.stringify(taps);
  box.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'inline-block';
}
function copyOut() {
  navigator.clipboard.writeText(JSON.stringify(taps)).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Copy JSON', 1600);
  });
}

// ── init ──────────────────────────────────────────────────────────────────
load();
refreshAll();
const done0 = taps.filter(t => t !== null).length;
if (done0 > 0) {
  statusEl.textContent = `${done0} lines saved — press ▶ START to continue`;
}
</script>
</body>
</html>
