<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>神后 Tap Calibration</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f; color: #fff;
  font-family: -apple-system, sans-serif;
  min-height: 100vh; padding: 16px 12px 40px;
  user-select: none; -webkit-user-select: none;
}

h1 { font-size: 1rem; color: #555; text-align: center; margin-bottom: 12px; }

/* ── status bar ── */
#status { font-size: 0.8rem; color: #555; text-align: center; height: 16px; margin-bottom: 10px; }

/* ── progress ── */
#progress-wrap { display: flex; justify-content: center; gap: 8px; align-items: center; margin-bottom: 14px; }
#prog-text { font-size: 0.8rem; color: #444; }
#prog-bar-wrap { flex: 1; max-width: 260px; height: 4px; background: #1a1a1a; border-radius: 2px; }
#prog-bar { height: 100%; background: #7b2fff; border-radius: 2px; transition: width 0.2s; }

/* ── lyric display ── */
#prev-line { font-size: 0.9rem; color: #333; text-align: center; min-height: 26px; margin-bottom: 4px; }
#line-display {
  font-size: 2.6rem; font-weight: 800; color: #00d4ff;
  text-align: center; min-height: 76px;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: 0.06em; margin-bottom: 4px;
}
#next-line { font-size: 0.9rem; color: #333; text-align: center; min-height: 26px; margin-bottom: 18px; }

/* ── clock ── */
#clock {
  font-size: 2.6rem; font-weight: 800; font-variant-numeric: tabular-nums;
  color: #ffd700; text-align: center; margin-bottom: 6px; letter-spacing: 0.04em;
}

/* ── seek bar ── */
#seek-wrap { padding: 4px 8px; margin-bottom: 20px; }
#seek { width: 100%; accent-color: #7b2fff; cursor: pointer; }

/* ── tap button ── */
#tap-btn {
  display: block; width: min(360px, 94vw); margin: 0 auto 16px;
  height: 100px;
  background: linear-gradient(135deg, #7b2fff, #00d4ff);
  border: none; border-radius: 20px; cursor: pointer;
  font-size: 1.5rem; font-weight: 800; color: #fff;
  letter-spacing: 0.08em; touch-action: manipulation;
  transition: transform 0.07s, opacity 0.07s;
  -webkit-tap-highlight-color: transparent;
}
#tap-btn:active { transform: scale(0.93); opacity: 0.82; }
#tap-btn:disabled { background: #1a1a1a; color: #444; cursor: default; }
#tap-btn.tapped { background: linear-gradient(135deg,#ff2fa8,#ffd700) !important; }

/* ── controls ── */
#controls {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin-bottom: 18px;
}
button.ctrl {
  padding: 9px 16px; border-radius: 10px;
  border: 1px solid #2a2a2a; background: #111; color: #888;
  cursor: pointer; font-size: 0.82rem;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
button.ctrl:active { background: #1e1e1e; color: #ccc; }
button.ctrl.danger { border-color: #500; color: #c44; }

/* ── jump-to ── */
#jump-wrap { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 16px; }
#jump-wrap label { font-size: 0.78rem; color: #555; }
#jump-input { width: 56px; padding: 6px 8px; border-radius: 8px;
  border: 1px solid #2a2a2a; background: #111; color: #fff;
  font-size: 0.9rem; text-align: center; }
#jump-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #7b2fff;
  background: #1a0a3a; color: #b980ff; cursor: pointer; font-size: 0.8rem; }

/* ── tapped log ── */
#log { max-height: 160px; overflow-y: auto; margin-bottom: 14px; }
#log div { font-size: 0.75rem; padding: 2px 4px; border-bottom: 1px solid #111; }
#log .ok  { color: #0a8; }
#log .cur { color: #00d4ff; font-weight: 700; }
#log .skip { color: #555; font-style: italic; }

/* ── output ── */
#output-box {
  display: none; margin: 4px 0;
  background: #0a100a; border: 1px solid #1a3a1a; border-radius: 10px;
  padding: 10px; font-size: 0.68rem; color: #0c0; word-break: break-all;
  white-space: pre-wrap; max-height: 160px; overflow-y: auto;
}
#copy-btn {
  display: none; margin-top: 8px; padding: 8px 24px; border-radius: 8px;
  border: 1px solid #0c0; background: #001800; color: #0c0;
  cursor: pointer; font-size: 0.85rem;
}
#save-note { font-size: 0.7rem; color: #3a3a3a; text-align: center; margin-top: 6px; }
</style>
</head>
<body>

<h1>神后 — Full Song Tap Calibration</h1>
<div id="status">Press START to load audio</div>

<div id="progress-wrap">
  <div id="prog-text">0 / 72</div>
  <div id="prog-bar-wrap"><div id="prog-bar" style="width:0%"></div></div>
</div>

<div id="prev-line"></div>
<div id="line-display">—</div>
<div id="next-line"></div>

<div id="clock">0.0s</div>
<div id="seek-wrap"><input type="range" id="seek" min="0" max="307" step="0.1" value="0"></div>

<button id="tap-btn" disabled>TAP when she sings</button>

<div id="controls">
  <button class="ctrl" id="start-btn">▶ START</button>
  <button class="ctrl" id="undo-btn">↩ UNDO</button>
  <button class="ctrl" id="skip-btn">⏭ SKIP line</button>
  <button class="ctrl" id="done-btn">✓ DONE</button>
  <button class="ctrl danger" id="clear-btn">✕ CLEAR ALL</button>
</div>

<div id="jump-wrap">
  <label>Jump to line:</label>
  <input type="number" id="jump-input" min="1" max="72" placeholder="1-72">
  <button id="jump-btn">Go</button>
</div>

<div id="log"></div>
<div id="output-box"></div>
<button id="copy-btn" onclick="copyOutput()">📋 Copy JSON</button>
<div id="save-note">Progress auto-saved in browser</div>

<script>
const AUDIO_SRC = '/media/shen-hou-mv-audio.mp3';
const STORAGE_KEY = 'shen-hou-calib-v2';

const LINES = [
  '我','喜欢看你','孩子般走在前头','像第一次','发现世界的探索',
  '告诉我','鲜艳的颜色好多','你','改不掉突然','停下来回过头',
  '想再一次','习惯性确认什么','像是要牵手','或是一起走',
  '直到风景褪色','的时候','你身后','我身后','会有我',
  '守护你看见','尽头的背后','那片天空','等着另一端','新的生活',
  '能不能','答应我','临别时候','或许你就先走','徒留感伤就',
  '请你留给我','让我面对','你往后的寂寞','能不能答应我',
  '分开时候','放心回头看我','让我明白牵挂着','你的手',
  '松开后还能忍住','泪向你告别','挥手','记得你爱过',
  '你要记得你爱过','记得你曾经走过','记得继续向前走',
  '记得我眼中','见过你停留','你的身影','一直在我的',
  '世界里驻守','能不能答应我','分开时候','放心回头看我',
  '让我明白牵挂着','你的手','松开后','能拭去泪向你',
  '告别挥手','别急着答应我','难过的话','现在不要说',
  '呜','好好享受','安宁的温柔','能不能答应我','再见时候',
  '就别再认出我','别让我承受','牵过的你的手','再重逢',
  '已换作','你向我告别','挥手'
];

// taps[i] = number (audio time) or null (skipped / not yet done)
let taps = Array(LINES.length).fill(null);
let lineIdx = 0;   // next line to tap
let audio = null;
let running = false;
let rafId = null;
let seekDragging = false;

// ── DOM ───────────────────────────────────────────────────────────────────
const tapBtn    = document.getElementById('tap-btn');
const lineDisp  = document.getElementById('line-display');
const prevLine  = document.getElementById('prev-line');
const nextLine  = document.getElementById('next-line');
const clockEl   = document.getElementById('clock');
const statusEl  = document.getElementById('status');
const progText  = document.getElementById('prog-text');
const progBar   = document.getElementById('prog-bar');
const logEl     = document.getElementById('log');
const seekEl    = document.getElementById('seek');

// ── load saved progress ───────────────────────────────────────────────────
function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.taps) && data.taps.length === LINES.length) {
      taps = data.taps;
      lineIdx = data.lineIdx || taps.findIndex(t => t === null && taps.indexOf(t) >= 0);
      // lineIdx = first null after last non-null
      lineIdx = 0;
      for (let i = 0; i < taps.length; i++) {
        if (taps[i] !== null) lineIdx = i + 1;
      }
      lineIdx = Math.min(lineIdx, LINES.length);
    }
  } catch(e) {}
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ taps, lineIdx }));
  } catch(e) {}
}

// ── display ───────────────────────────────────────────────────────────────
function updateDisplay() {
  const done = taps.filter(t => t !== null).length;
  progText.textContent = `${done} / ${LINES.length}`;
  progBar.style.width = (done / LINES.length * 100) + '%';

  if (lineIdx >= LINES.length) {
    lineDisp.textContent = '✓ All done!';
    prevLine.textContent = '';
    nextLine.textContent = '';
    tapBtn.disabled = true;
    showOutput();
    return;
  }

  lineDisp.textContent = LINES[lineIdx];
  prevLine.textContent = lineIdx > 0
    ? (taps[lineIdx-1] !== null ? `✓ ${LINES[lineIdx-1]}` : `— ${LINES[lineIdx-1]}`)
    : '';
  nextLine.textContent = lineIdx + 1 < LINES.length ? `↓  ${LINES[lineIdx+1]}` : '';
}

function rebuildLog() {
  logEl.innerHTML = '';
  for (let i = Math.max(0, lineIdx - 12); i <= Math.min(LINES.length - 1, lineIdx + 3); i++) {
    const div = document.createElement('div');
    if (i === lineIdx) {
      div.className = 'cur';
      div.textContent = `▶ L${i+1} ${LINES[i]}`;
    } else if (taps[i] !== null) {
      div.className = 'ok';
      div.textContent = `✓ L${i+1} [${taps[i].toFixed(3)}s] ${LINES[i]}`;
    } else {
      div.className = 'skip';
      div.textContent = `— L${i+1} ${LINES[i]}`;
    }
    logEl.appendChild(div);
  }
  // scroll to bottom
  logEl.scrollTop = logEl.scrollHeight;
}

// ── clock RAF ─────────────────────────────────────────────────────────────
function tick() {
  if (audio && !seekDragging) {
    const t = audio.currentTime;
    clockEl.textContent = t.toFixed(1) + 's';
    seekEl.value = t;
  }
  rafId = requestAnimationFrame(tick);
}

// ── seek bar ──────────────────────────────────────────────────────────────
seekEl.addEventListener('mousedown',  () => { seekDragging = true; });
seekEl.addEventListener('touchstart', () => { seekDragging = true; }, { passive: true });
seekEl.addEventListener('input', () => {
  if (audio) { audio.currentTime = parseFloat(seekEl.value); }
  clockEl.textContent = parseFloat(seekEl.value).toFixed(1) + 's';
});
seekEl.addEventListener('mouseup',  () => { seekDragging = false; });
seekEl.addEventListener('touchend', () => { seekDragging = false; });

// ── start ─────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', async () => {
  if (audio) { audio.play(); return; }
  statusEl.textContent = 'Loading…';
  audio = new Audio(AUDIO_SRC);
  audio.preload = 'auto';
  seekEl.max = 307;

  audio.addEventListener('loadedmetadata', () => {
    seekEl.max = audio.duration || 307;
  });

  audio.addEventListener('canplaythrough', () => {
    statusEl.textContent = 'Tap the button the moment each line starts';
    tapBtn.disabled = false;
    audio.play();
    running = true;
    updateDisplay();
    rebuildLog();
    tick();
  }, { once: true });
  audio.addEventListener('error', () => { statusEl.textContent = '⚠ Audio load error'; });
  audio.load();
});

// ── TAP ───────────────────────────────────────────────────────────────────
function doTap() {
  if (!running || !audio || lineIdx >= LINES.length) return;
  const t = audio.currentTime;
  taps[lineIdx] = t;

  tapBtn.classList.add('tapped');
  setTimeout(() => tapBtn.classList.remove('tapped'), 140);

  lineIdx++;
  save();
  updateDisplay();
  rebuildLog();
}

tapBtn.addEventListener('click', doTap);
tapBtn.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); doTap(); }
});

// ── undo ──────────────────────────────────────────────────────────────────
document.getElementById('undo-btn').addEventListener('click', () => {
  if (lineIdx === 0) return;
  lineIdx--;
  taps[lineIdx] = null;
  save();
  updateDisplay();
  rebuildLog();
  document.getElementById('output-box').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
});

// ── skip ──────────────────────────────────────────────────────────────────
document.getElementById('skip-btn').addEventListener('click', () => {
  if (!running || lineIdx >= LINES.length) return;
  taps[lineIdx] = null;   // mark skipped (null = interpolate later)
  lineIdx++;
  save();
  updateDisplay();
  rebuildLog();
});

// ── jump-to ───────────────────────────────────────────────────────────────
document.getElementById('jump-btn').addEventListener('click', () => {
  const v = parseInt(document.getElementById('jump-input').value);
  if (isNaN(v) || v < 1 || v > LINES.length) return;
  lineIdx = v - 1;
  save();
  updateDisplay();
  rebuildLog();
  tapBtn.disabled = !running;
});

// ── clear ─────────────────────────────────────────────────────────────────
document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('Clear ALL taps and start over?')) return;
  taps = Array(LINES.length).fill(null);
  lineIdx = 0;
  save();
  updateDisplay();
  rebuildLog();
  document.getElementById('output-box').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
});

// ── done ──────────────────────────────────────────────────────────────────
document.getElementById('done-btn').addEventListener('click', showOutput);

function showOutput() {
  const box = document.getElementById('output-box');
  box.textContent = JSON.stringify(taps);
  box.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'inline-block';
}

function copyOutput() {
  navigator.clipboard.writeText(JSON.stringify(taps)).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Copy JSON', 1600);
  });
}

// ── init ──────────────────────────────────────────────────────────────────
loadSaved();
updateDisplay();
rebuildLog();
if (taps.filter(t => t !== null).length > 0) {
  statusEl.textContent = `Resumed — ${taps.filter(t=>t!==null).length} lines saved. Press START to continue.`;
}
</script>
</body>
</html>
