<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>神后 Timing Calibration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 20px;
    user-select: none; -webkit-user-select: none;
  }
  h1 { font-size: 1.1rem; color: #888; margin-bottom: 8px; }
  #status { font-size: 0.85rem; color: #555; margin-bottom: 16px; height: 18px; }
  #progress { font-size: 0.8rem; color: #444; margin-bottom: 20px; }

  #line-display {
    font-size: 2.2rem; font-weight: 700;
    color: #00d4ff; text-align: center;
    min-height: 70px; display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px; letter-spacing: 0.05em;
  }
  #line-next {
    font-size: 1rem; color: #444;
    text-align: center; min-height: 28px;
    margin-bottom: 28px;
  }
  #clock {
    font-size: 3rem; font-weight: 800; font-variant-numeric: tabular-nums;
    color: #ffd700; margin-bottom: 32px; letter-spacing: 0.05em;
  }

  #tap-btn {
    width: min(340px, 90vw); height: 110px;
    background: linear-gradient(135deg, #7b2fff, #00d4ff);
    border: none; border-radius: 20px; cursor: pointer;
    font-size: 1.6rem; font-weight: 800; color: #fff;
    letter-spacing: 0.08em; touch-action: manipulation;
    transition: transform 0.07s, opacity 0.07s;
    -webkit-tap-highlight-color: transparent;
  }
  #tap-btn:active { transform: scale(0.94); opacity: 0.85; }
  #tap-btn:disabled { background: #222; color: #555; cursor: default; }

  #controls { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
  button.ctrl {
    padding: 10px 20px; border-radius: 10px; border: 1px solid #333;
    background: #111; color: #aaa; cursor: pointer; font-size: 0.85rem;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  button.ctrl:active { background: #222; }

  #tapped-list {
    margin-top: 28px; width: min(400px, 96vw);
    font-size: 0.8rem; color: #555; max-height: 180px; overflow-y: auto;
  }
  #tapped-list div { padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
  #tapped-list .latest { color: #00d4ff; }

  #output-box {
    display: none; margin-top: 20px; width: min(400px, 96vw);
    background: #111; border: 1px solid #333; border-radius: 10px;
    padding: 12px; font-size: 0.7rem; color: #0f0; word-break: break-all;
    white-space: pre-wrap; max-height: 200px; overflow-y: auto;
  }
  #copy-btn { display: none; margin-top: 8px; padding: 8px 20px; border-radius: 8px;
    border: 1px solid #0f0; background: #001a00; color: #0f0; cursor: pointer; }
</style>
</head>
<body>

<h1>神后 — Line Timing Calibration</h1>
<div id="status">Press START to load audio</div>
<div id="progress"></div>

<div id="line-display">—</div>
<div id="line-next"></div>
<div id="clock">0.0s</div>

<button id="tap-btn" disabled>TAP when she sings</button>

<div id="controls">
  <button class="ctrl" id="start-btn">▶ START</button>
  <button class="ctrl" id="undo-btn">↩ UNDO</button>
  <button class="ctrl" id="done-btn">✓ DONE</button>
</div>

<div id="tapped-list"></div>
<div id="output-box"></div>
<button id="copy-btn" onclick="copyOutput()">Copy JSON</button>

<script>
const AUDIO_SRC = '/media/shen-hou-mv-audio.mp3';

const LINES = [
  '我','喜欢看你','孩子般走在前头','像第一次','发现世界的探索',
  '告诉我','鲜艳的颜色好多','你','改不掉突然','停下来回过头',
  '想再一次','习惯性确认什么','像是要牵手','或是一起走',
  '直到风景褪色','的时候','你身后','我身后','会有我',
  '守护你看见','尽头的背后','那片天空','等着另一端','新的生活',
  '能不能','答应我','临别时候','或许你就先走','徒留感伤就',
  '请你留给我','让我面对','你往后的寂寞','能不能答应我',
  '分开时候','放心回头看我','让我明白牵挂着','你的手',
  '松开后还能忍住','泪向你告别','挥手','记得你爱过',
  '你要记得你爱过','记得你曾经走过','记得继续向前走',
  '记得我眼中','见过你停留','你的身影','一直在我的',
  '世界里驻守','能不能答应我','分开时候','放心回头看我',
  '让我明白牵挂着','你的手','松开后','能拭去泪向你',
  '告别挥手','别急着答应我','难过的话','现在不要说',
  '呜','好好享受','安宁的温柔','能不能答应我','再见时候',
  '就别再认出我','别让我承受','牵过的你的手','再重逢',
  '已换作','你向我告别','挥手'
];

let audio = null;
let tapped = [];   // [{line, time}]
let lineIdx = 0;
let running = false;
let clockRaf = null;

const tapBtn   = document.getElementById('tap-btn');
const lineDisp = document.getElementById('line-display');
const lineNext = document.getElementById('line-next');
const clockEl  = document.getElementById('clock');
const statusEl = document.getElementById('status');
const progressEl= document.getElementById('progress');
const tappedList= document.getElementById('tapped-list');

function updateClock() {
  if (audio) clockEl.textContent = audio.currentTime.toFixed(1) + 's';
  clockRaf = requestAnimationFrame(updateClock);
}

function updateDisplay() {
  if (lineIdx >= LINES.length) {
    lineDisp.textContent = '✓ Done!';
    lineNext.textContent = '';
    tapBtn.disabled = true;
    showOutput();
    return;
  }
  lineDisp.textContent = LINES[lineIdx];
  lineNext.textContent = lineIdx + 1 < LINES.length ? '↓  ' + LINES[lineIdx + 1] : '';
  progressEl.textContent = `Line ${lineIdx + 1} / ${LINES.length}`;
}

document.getElementById('start-btn').addEventListener('click', async () => {
  if (audio) { audio.currentTime = 0; audio.play(); return; }
  statusEl.textContent = 'Loading audio…';
  audio = new Audio(AUDIO_SRC);
  audio.preload = 'auto';
  audio.addEventListener('canplaythrough', () => {
    statusEl.textContent = 'Tap TAP each time a new line starts singing';
    tapBtn.disabled = false;
    audio.play();
    running = true;
    updateDisplay();
    updateClock();
  }, { once: true });
  audio.addEventListener('error', () => { statusEl.textContent = 'Audio load error'; });
  audio.load();
});

function doTap() {
  if (!running || !audio || lineIdx >= LINES.length) return;
  const t = audio.currentTime;
  tapped.push({ line: LINES[lineIdx], time: t });

  // Flash
  tapBtn.style.background = 'linear-gradient(135deg,#ff2fa8,#ffd700)';
  setTimeout(() => tapBtn.style.background = '', 120);

  // Update list
  const div = document.createElement('div');
  div.className = 'latest';
  div.textContent = `L${lineIdx+1} [${t.toFixed(3)}] ${LINES[lineIdx]}`;
  tappedList.prepend(div);
  if (tappedList.children[1]) tappedList.children[1].className = '';

  lineIdx++;
  updateDisplay();
}

tapBtn.addEventListener('click', doTap);
tapBtn.addEventListener('touchstart', e => { e.preventDefault(); doTap(); }, { passive: false });

// Spacebar support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); doTap(); }
});

document.getElementById('undo-btn').addEventListener('click', () => {
  if (tapped.length === 0) return;
  tapped.pop();
  lineIdx = Math.max(0, lineIdx - 1);
  if (tappedList.firstChild) tappedList.removeChild(tappedList.firstChild);
  if (tappedList.firstChild) tappedList.firstChild.className = 'latest';
  updateDisplay();
  document.getElementById('output-box').style.display = 'none';
  document.getElementById('copy-btn').style.display = 'none';
});

document.getElementById('done-btn').addEventListener('click', showOutput);

function showOutput() {
  const times = tapped.map(t => t.time);
  const box = document.getElementById('output-box');
  box.textContent = JSON.stringify(times, null, 0);
  box.style.display = 'block';
  document.getElementById('copy-btn').style.display = 'inline-block';
}

function copyOutput() {
  const times = tapped.map(t => t.time);
  navigator.clipboard.writeText(JSON.stringify(times)).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Copied!';
    setTimeout(() => document.getElementById('copy-btn').textContent = 'Copy JSON', 1500);
  });
}
</script>
</body>
</html>
