<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Frenzy — World Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  .map-container {
    position: relative;
    width: 1200px;
    height: 900px;
    background: #2A5BA0;
    border: 6px solid #C07820;
    box-shadow:
      0 0 0 3px #E8A830,
      0 0 0 9px #5C3A28,
      0 0 60px rgba(59, 125, 216, 0.3);
    overflow: hidden;
    image-rendering: pixelated;
  }

  /* Ocean background with depth zones */
  .ocean {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, #3B7DD8 0%, #2A5BA0 50%, #1E4480 100%);
  }

  /* Animated water pattern overlay */
  .water-pattern {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 18px,
        rgba(91, 160, 232, 0.12) 18px,
        rgba(91, 160, 232, 0.12) 20px
      );
    animation: waterDrift 4s ease-in-out infinite;
  }

  @keyframes waterDrift {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(8px); }
  }

  /* Sparkle/light reflection on water */
  .water-sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(240, 224, 192, 0.6);
    animation: sparkle 3s ease-in-out infinite;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; }
  }

  /* ============ ISLANDS / LAND MASSES ============ */
  .island {
    position: absolute;
    border-radius: 4px;
    image-rendering: pixelated;
  }

  /* Shared island ground style */
  .island-base {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow:
      0 4px 0 rgba(0,0,0,0.2),
      inset 0 -8px 0 rgba(0,0,0,0.1);
  }

  /* ---- CENTRAL HUB: Whispering Ponds ---- */
  .island-hub {
    width: 220px;
    height: 200px;
    left: 490px;
    top: 340px;
    background: #5BAF55;
    border: 3px solid #3D7A3A;
    border-radius: 40% 50% 45% 55%;
    z-index: 10;
  }

  .island-hub .shore {
    position: absolute;
    inset: -8px;
    border-radius: inherit;
    background: #D4C490;
    z-index: -1;
    opacity: 0.7;
  }

  /* Cabin on hub island */
  .cabin {
    position: absolute;
    width: 60px;
    height: 50px;
    top: 30px;
    left: 80px;
  }

  .cabin-body {
    position: absolute;
    bottom: 0;
    width: 54px;
    height: 30px;
    left: 3px;
    background: #8B5E3C;
    border: 2px solid #5C3A28;
  }

  .cabin-roof {
    position: absolute;
    top: 0;
    width: 0;
    height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 22px solid #A0522D;
    filter: drop-shadow(0 -1px 0 #5C3A28);
  }

  .cabin-door {
    position: absolute;
    bottom: 0;
    left: 19px;
    width: 16px;
    height: 20px;
    background: #5C3A28;
    border: 2px solid #3D2515;
  }

  .cabin-window {
    position: absolute;
    top: 6px;
    width: 10px;
    height: 8px;
    background: #F0E0C0;
    border: 2px solid #5C3A28;
  }

  .cabin-window.left { left: 5px; }
  .cabin-window.right { right: 5px; }

  /* Waterfall on hub */
  .waterfall-hub {
    position: absolute;
    right: 20px;
    top: 50px;
    width: 16px;
    height: 40px;
    background: linear-gradient(180deg, #5BA0E8, #9BD4FF, #5BA0E8);
    border-radius: 2px;
    animation: waterfallFlow 0.6s linear infinite;
    box-shadow: 0 0 8px rgba(91, 160, 232, 0.5);
  }

  @keyframes waterfallFlow {
    0% { background-position: 0 0; }
    100% { background-position: 0 16px; }
  }

  .waterfall-splash {
    position: absolute;
    right: 14px;
    top: 88px;
    width: 28px;
    height: 10px;
    background: radial-gradient(ellipse, rgba(155, 212, 255, 0.7) 0%, transparent 70%);
    animation: splashPulse 1s ease-in-out infinite;
  }

  @keyframes splashPulse {
    0%, 100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.2); opacity: 1; }
  }

  /* ---- TOP-LEFT: Misty Marshes (swamp) ---- */
  .island-swamp {
    width: 260px;
    height: 180px;
    left: 40px;
    top: 50px;
    background: #4A7A3A;
    border: 3px solid #2E5524;
    border-radius: 55% 40% 50% 45%;
    z-index: 10;
  }

  .island-swamp .shore {
    position: absolute;
    inset: -6px;
    border-radius: inherit;
    background: #6B7A50;
    z-index: -1;
    opacity: 0.6;
  }

  /* Swamp trees */
  .swamp-tree {
    position: absolute;
    width: 8px;
    background: #5C3A28;
    border-radius: 2px;
  }

  .swamp-tree::before {
    content: '';
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 24px;
    background: #2E7D32;
    border-radius: 50% 50% 40% 40%;
    box-shadow: inset -4px -4px 0 #1B5E20;
  }

  /* Swamp vines/moss */
  .moss {
    position: absolute;
    width: 20px;
    height: 6px;
    background: #6B8E23;
    border-radius: 50%;
    opacity: 0.7;
  }

  /* Swamp pond */
  .swamp-pond {
    position: absolute;
    width: 60px;
    height: 35px;
    background: #2A6B40;
    border-radius: 50%;
    border: 2px solid #1B5E20;
    top: 90px;
    left: 50px;
  }

  /* ---- TOP-RIGHT: Frostpeak Falls (mountain/snow) ---- */
  .island-mountain {
    width: 240px;
    height: 200px;
    right: 50px;
    top: 30px;
    background: #7A8B6A;
    border: 3px solid #5A6B4A;
    border-radius: 45% 50% 40% 55%;
    z-index: 10;
  }

  .island-mountain .shore {
    position: absolute;
    inset: -7px;
    border-radius: inherit;
    background: #9AA080;
    z-index: -1;
    opacity: 0.5;
  }

  /* Mountains */
  .mountain {
    position: absolute;
    width: 0;
    height: 0;
  }

  .mountain.big {
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 80px solid #8B8B80;
    top: 10px;
    left: 70px;
  }

  .mountain.big::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -18px;
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-bottom: 28px solid #E8E8E0;
  }

  .mountain.med {
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 60px solid #9A9A8A;
    top: 30px;
    left: 140px;
  }

  .mountain.med::after {
    content: '';
    position: absolute;
    top: -2px;
    left: -12px;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 20px solid #E8E8E0;
  }

  .mountain.small {
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 42px solid #A0A090;
    top: 48px;
    left: 20px;
  }

  .mountain.small::after {
    content: '';
    position: absolute;
    top: -1px;
    left: -9px;
    width: 0;
    height: 0;
    border-left: 9px solid transparent;
    border-right: 9px solid transparent;
    border-bottom: 14px solid #E8E8E0;
  }

  /* Mountain river */
  .mountain-river {
    position: absolute;
    width: 8px;
    height: 70px;
    background: linear-gradient(180deg, #5BA0E8 0%, #3B7DD8 100%);
    top: 90px;
    left: 118px;
    border-radius: 4px;
    transform: rotate(5deg);
  }

  /* Mountain pines */
  .pine {
    position: absolute;
  }

  .pine::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 10px;
    background: #5C3A28;
  }

  .pine::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 20px solid #2E5524;
  }

  /* ---- BOTTOM-LEFT: Coral Cove (tropical) ---- */
  .island-tropical {
    width: 230px;
    height: 170px;
    left: 60px;
    bottom: 100px;
    background: #6BBF59;
    border: 3px solid #4A9A3A;
    border-radius: 50% 45% 55% 40%;
    z-index: 10;
  }

  .island-tropical .shore {
    position: absolute;
    inset: -8px;
    border-radius: inherit;
    background: #E8D8A0;
    z-index: -1;
    opacity: 0.8;
  }

  /* Palm trees */
  .palm {
    position: absolute;
  }

  .palm-trunk {
    width: 6px;
    height: 40px;
    background: #A07040;
    border-radius: 2px;
    transform: rotate(-8deg);
    transform-origin: bottom center;
  }

  .palm-frond {
    position: absolute;
    width: 30px;
    height: 14px;
    background: #4CAF50;
    border-radius: 50% 50% 20% 20%;
    top: -8px;
  }

  .palm-frond.l { left: -22px; transform: rotate(-25deg); }
  .palm-frond.r { left: 2px; transform: rotate(25deg); }
  .palm-frond.c { left: -10px; top: -14px; transform: rotate(5deg); }

  /* Beach hut */
  .beach-hut {
    position: absolute;
    top: 60px;
    left: 100px;
  }

  .beach-hut-body {
    width: 36px;
    height: 24px;
    background: #D4A460;
    border: 2px solid #A07840;
  }

  .beach-hut-roof {
    width: 0;
    height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-bottom: 16px solid #C07820;
    position: relative;
    left: -4px;
  }

  /* Coral reef patches near tropical */
  .coral {
    position: absolute;
    border-radius: 50%;
    z-index: 5;
  }

  .coral.pink { background: #E87080; }
  .coral.orange { background: #E8A040; }
  .coral.purple { background: #A070C0; }

  /* ---- BOTTOM-RIGHT: Sunken Ruins (mysterious) ---- */
  .island-ruins {
    width: 200px;
    height: 160px;
    right: 80px;
    bottom: 80px;
    background: #5A8A5A;
    border: 3px solid #3A6A3A;
    border-radius: 48% 52% 42% 58%;
    z-index: 10;
  }

  .island-ruins .shore {
    position: absolute;
    inset: -7px;
    border-radius: inherit;
    background: #B0A880;
    z-index: -1;
    opacity: 0.6;
  }

  /* Stone ruins */
  .ruin-pillar {
    position: absolute;
    background: #A0A090;
    border: 2px solid #808070;
  }

  .ruin-pillar::after {
    content: '';
    position: absolute;
    top: -6px;
    left: -3px;
    width: calc(100% + 6px);
    height: 6px;
    background: #B0B0A0;
    border: 2px solid #808070;
  }

  /* Glowing rune */
  .rune {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 2px solid #70D0A0;
    border-radius: 50%;
    animation: runeGlow 2s ease-in-out infinite;
  }

  @keyframes runeGlow {
    0%, 100% { box-shadow: 0 0 4px #70D0A0; opacity: 0.6; }
    50% { box-shadow: 0 0 12px #70D0A0, 0 0 24px rgba(112, 208, 160, 0.3); opacity: 1; }
  }

  /* Sunken temple entrance */
  .temple-entrance {
    position: absolute;
    width: 40px;
    height: 30px;
    top: 50px;
    left: 80px;
    background: #707060;
    border: 2px solid #505040;
    clip-path: polygon(0% 100%, 10% 0%, 90% 0%, 100% 100%);
  }

  .temple-entrance::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 18px;
    background: #2A2A20;
    border-radius: 7px 7px 0 0;
  }

  /* ---- FAR ISLAND: Volcanic Depths (small, distant) ---- */
  .island-volcano {
    width: 120px;
    height: 100px;
    right: 20px;
    top: 260px;
    background: #6A5A4A;
    border: 3px solid #4A3A2A;
    border-radius: 50% 45% 55% 50%;
    z-index: 10;
  }

  .island-volcano .shore {
    position: absolute;
    inset: -5px;
    border-radius: inherit;
    background: #8A7A60;
    z-index: -1;
    opacity: 0.5;
  }

  /* Volcano */
  .volcano {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 55px solid #5A4A3A;
    top: 8px;
    left: 25px;
  }

  .volcano::after {
    content: '';
    position: absolute;
    top: -6px;
    left: -10px;
    width: 20px;
    height: 10px;
    background: #D84040;
    border-radius: 50%;
    box-shadow: 0 0 8px #D84040, 0 0 16px rgba(216, 64, 64, 0.5);
    animation: lavaGlow 1.5s ease-in-out infinite;
  }

  @keyframes lavaGlow {
    0%, 100% { box-shadow: 0 0 8px #D84040; }
    50% { box-shadow: 0 0 16px #E86040, 0 0 24px rgba(232, 96, 64, 0.4); }
  }

  /* Lava streams */
  .lava-stream {
    position: absolute;
    width: 4px;
    background: #E87040;
    border-radius: 2px;
    box-shadow: 0 0 4px rgba(232, 112, 64, 0.6);
  }

  /* ---- Small islet: Lily Lagoon ---- */
  .island-lagoon {
    width: 100px;
    height: 80px;
    left: 20px;
    top: 290px;
    background: #5BAF55;
    border: 3px solid #3D7A3A;
    border-radius: 55% 45% 50% 50%;
    z-index: 10;
  }

  .island-lagoon .shore {
    position: absolute;
    inset: -5px;
    border-radius: inherit;
    background: #D4C490;
    z-index: -1;
    opacity: 0.6;
  }

  /* ---- BOTTOM CENTER: Shipwreck Shallows (small) ---- */
  .island-shipwreck {
    width: 110px;
    height: 70px;
    left: 400px;
    bottom: 50px;
    background: #D4C490;
    border: 3px solid #B0A060;
    border-radius: 50% 50% 45% 55%;
    z-index: 10;
  }

  /* Shipwreck mast */
  .mast {
    position: absolute;
    width: 4px;
    height: 40px;
    background: #5C3A28;
    top: -20px;
    left: 30px;
    transform: rotate(12deg);
  }

  .mast::after {
    content: '';
    position: absolute;
    top: 5px;
    left: 2px;
    width: 25px;
    height: 18px;
    background: #C0A070;
    border: 2px solid #A08050;
    clip-path: polygon(0 0, 100% 20%, 100% 80%, 0 100%);
    opacity: 0.7;
  }

  .ship-hull {
    position: absolute;
    width: 50px;
    height: 16px;
    background: #5C3A28;
    border-radius: 0 0 50% 50%;
    top: 15px;
    left: 15px;
    transform: rotate(8deg);
    border: 2px solid #3D2515;
  }

  /* ============ WATERWAYS / CURRENTS ============ */
  .waterway {
    position: absolute;
    z-index: 8;
    opacity: 0.5;
  }

  .current-line {
    position: absolute;
    height: 3px;
    background: #5BA0E8;
    border-radius: 2px;
    opacity: 0.4;
  }

  /* ============ LILY PADS scattered on water ============ */
  .lilypad {
    position: absolute;
    border-radius: 50%;
    background: #4CAF50;
    z-index: 6;
    box-shadow: 1px 1px 0 #2E7D32;
  }

  .lilypad::after {
    content: '';
    position: absolute;
    top: 0;
    left: 45%;
    width: 2px;
    height: 50%;
    background: #3B7DD8;
  }

  /* Lily pad flower */
  .lily-flower {
    position: absolute;
    width: 8px;
    height: 8px;
    background: #F0C0D0;
    border-radius: 50%;
    z-index: 7;
    box-shadow: inset -2px -2px 0 #E0A0B0;
  }

  /* ============ DECORATIVE TREES on islands ============ */
  .tree {
    position: absolute;
  }

  .tree-trunk {
    width: 6px;
    height: 16px;
    background: #5C3A28;
    margin: 0 auto;
    border-radius: 1px;
  }

  .tree-canopy {
    width: 22px;
    height: 20px;
    background: #4CAF50;
    border-radius: 50% 50% 40% 40%;
    margin: 0 auto;
    position: relative;
    top: -4px;
    box-shadow: inset -4px -4px 0 #2E7D32;
  }

  .tree-canopy.dark {
    background: #2E7D32;
    box-shadow: inset -4px -4px 0 #1B5E20;
  }

  /* ============ BOATS ============ */
  .boat {
    position: absolute;
    z-index: 15;
  }

  .boat-hull {
    width: 24px;
    height: 10px;
    background: #A07840;
    border-radius: 0 0 8px 8px;
    border: 2px solid #704010;
  }

  .boat-char {
    position: absolute;
    width: 8px;
    height: 10px;
    background: #E8C090;
    border-radius: 4px 4px 0 0;
    bottom: 8px;
    left: 8px;
    border: 1px solid #C0A070;
  }

  .boat-char::after {
    content: '';
    position: absolute;
    top: -4px;
    left: 1px;
    width: 6px;
    height: 4px;
    background: #E8A830;
    border-radius: 2px 2px 0 0;
  }

  .fishing-line {
    position: absolute;
    width: 1px;
    height: 20px;
    background: #F0E0C0;
    top: -8px;
    right: -8px;
    transform: rotate(30deg);
    transform-origin: bottom left;
  }

  .fishing-line::after {
    content: '';
    position: absolute;
    top: -3px;
    left: -1px;
    width: 3px;
    height: 3px;
    background: #E8A830;
    border-radius: 50%;
  }

  /* ============ MAP LABELS ============ */
  .label {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    color: #F0E0C0;
    text-shadow:
      2px 0 0 #3D2515,
      -2px 0 0 #3D2515,
      0 2px 0 #3D2515,
      0 -2px 0 #3D2515,
      1px 1px 0 #3D2515,
      -1px -1px 0 #3D2515,
      1px -1px 0 #3D2515,
      -1px 1px 0 #3D2515;
    z-index: 20;
    white-space: nowrap;
    pointer-events: none;
  }

  .label.region {
    font-size: 8px;
    letter-spacing: 1px;
  }

  .label.title {
    font-size: 18px;
    color: #E8A830;
    text-shadow:
      3px 0 0 #5C3A28,
      -3px 0 0 #5C3A28,
      0 3px 0 #5C3A28,
      0 -3px 0 #5C3A28,
      2px 2px 0 #5C3A28,
      -2px -2px 0 #5C3A28,
      2px -2px 0 #5C3A28,
      -2px 2px 0 #5C3A28;
    letter-spacing: 3px;
  }

  .label.subtitle {
    font-size: 7px;
    color: #D4C490;
    letter-spacing: 4px;
  }

  /* Location dot marker */
  .marker {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #E8A830;
    border: 2px solid #C07820;
    border-radius: 50%;
    z-index: 19;
    box-shadow: 0 0 6px rgba(232, 168, 48, 0.5);
  }

  .marker.hub {
    width: 14px;
    height: 14px;
    background: #E8A830;
    border: 3px solid #C07820;
    animation: hubPulse 2s ease-in-out infinite;
  }

  @keyframes hubPulse {
    0%, 100% { box-shadow: 0 0 6px rgba(232, 168, 48, 0.5); }
    50% { box-shadow: 0 0 16px rgba(232, 168, 48, 0.8), 0 0 30px rgba(232, 168, 48, 0.3); }
  }

  /* ============ COMPASS ROSE ============ */
  .compass {
    position: absolute;
    bottom: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    z-index: 25;
  }

  .compass-ring {
    width: 60px;
    height: 60px;
    border: 3px solid #C07820;
    border-radius: 50%;
    background: rgba(92, 58, 40, 0.7);
    position: relative;
  }

  .compass-n, .compass-s, .compass-e, .compass-w {
    position: absolute;
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #E8A830;
  }

  .compass-n { top: 4px; left: 50%; transform: translateX(-50%); }
  .compass-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .compass-e { right: 5px; top: 50%; transform: translateY(-50%); }
  .compass-w { left: 5px; top: 50%; transform: translateY(-50%); }

  .compass-needle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 2px;
    height: 20px;
    transform: translate(-50%, -50%);
  }

  .compass-needle::before {
    content: '';
    position: absolute;

    height: 0;

    position: absolute;
    bottom: 0;

    border-right: 4px solid transparent;

  .fish-shadow {
    position: absolute;
    width: 16px;
    height: 8px;
    background: rgba(30, 68, 128, 0.4);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    z-index: 4;
  }

  .fish-shadow::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 1px;
    width: 0;
    height: 0;
    border-top: 3px solid transparent;
    border-bottom: 3px solid transparent;
    border-left: 7px solid rgba(30, 68, 128, 0.4);
  }

    animation: fishSwim 8s ease-in-out infinite;
  }

  .fish-shadow.swim2 {
    animation: fishSwim2 10s ease-in-out infinite;
  }

  .fish-shadow.swim3 {
    animation: fishSwim3 6s ease-in-out infinite;
  }

  @keyframes fishSwim {
    0%, 100% { transform: translateX(0) translateY(0); }
    25% { transform: translateX(30px) translateY(-10px); }
    50% { transform: translateX(50px) translateY(5px); }
    75% { transform: translateX(20px) translateY(15px); }

  @keyframes fishSwim2 {

    49% { transform: translateX(60px) scaleX(1); }
    50% { transform: translateX(60px) scaleX(-1); }
    99% { transform: translateX(0) scaleX(-1); }

  @keyframes fishSwim3 {

    33% { transform: translateX(-20px) translateY(10px) rotate(-5deg); }
    66% { transform: translateX(-40px) translateY(-5px) rotate(5deg); }
